<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NDS TalentScore — AI Résumé Scoring</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    @keyframes slideIn { from { transform: translateX(-100%); } to { transform: none; } }

    /* ---------- responsive ---------- */
    .sidebar-desktop { height: 100%; }

    @media (max-width: 1100px) {
      .dash-grid { grid-template-columns: 1fr !important; }
      .report-grid { grid-template-columns: 1fr !important; }
    }

    @media (max-width: 900px) {
      .app-root { grid-template-columns: 1fr !important; }
      .sidebar-desktop { display: none; }
      .mobile-menu-btn { display: grid !important; place-items: center; }
      .topbar-search { display: none !important; }
      .sg-grid { grid-template-columns: 1fr !important; }
    }

    /* candidate table -> cards on small screens */
    @media (max-width: 820px) {
      .cand-head { display: none !important; }
      .cand-row {
        grid-template-columns: 22px auto 1fr auto !important;
        grid-template-areas:
          "sel av name match"
          "sel av role match" !important;
        row-gap: 2px !important;
        column-gap: 12px !important;
      }
      .cand-row > :nth-child(1) { grid-area: sel; align-self: center; }
      .cand-row > :nth-child(2) { display: none !important; }       /* rank */
      .cand-row > :nth-child(3) { grid-area: av; }
      .cand-row > .col-role { grid-area: role; }
      .cand-row > .col-exp, .cand-row > .col-certs, .cand-row > .col-rec { display: none !important; }
      .cand-row > :last-child { grid-area: match; align-self: center; }
    }

    @media (max-width: 640px) {
      main { padding: 18px 16px 50px !important; }
      .upload-feats { grid-template-columns: 1fr !important; }
      .upload-cta span { display: none; }
      .report-grid .sg-grid { grid-template-columns: 1fr !important; }
    }

    /* compare matrix horizontal scroll on mobile */
    @media (max-width: 760px) {
      .report-grid { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="components/ui.jsx"></script>
  <script type="text/babel" src="components/charts.jsx"></script>
  <script type="text/babel" src="components/shell.jsx"></script>
  <script type="text/babel" src="components/dashboard.jsx"></script>
  <script type="text/babel" src="components/upload.jsx"></script>
  <script type="text/babel" src="components/database.jsx"></script>
  <script type="text/babel" src="components/report.jsx"></script>
  <script type="text/babel" src="components/compare.jsx"></script>
  <script type="text/babel" src="components/extras.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
